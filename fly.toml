# fly.toml — Centinell deployment config
app = "centinell"
primary_region = "ams"  # Amsterdam — más cercano a España disponible

[build]

[env]
  PORT = "8001"
  # Variables no sensibles. Las sensibles van en: fly secrets set ...

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1      # siempre al menos 1 activo (necesario para Power Automate)
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "centinell_storage"
  destination = "/app/storage"
  initial_size = "5gb"
